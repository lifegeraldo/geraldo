<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Transmissão ao Vivo</title>
<!-- Carrega a API do JaaS -->
<script src='https://8x8.vc/vpaas-magic-cookie-fa33f91f501b4820ae2df5ba93618f17/external_api.js' async></script>

<style>
    /* Zera as margens e garante que a página ocupe todo o espaço */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
    }

    /* Contêiner principal para organizar a tela */
    .site-wrapper {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* Container da câmera/Jitsi ocupando o espaço principal */
    #video-container {
        flex: 1;
        width: 100%;
        position: relative;
    }

    /* Força o iframe da câmera a cobrir toda a área do contêiner */
    #jaas-container {
        width: 100%;
        height: 100%;
    }

    /* Barra de navegação e rodapé */
    .navbar {
        background-color: #f1f1f1;
        padding: 15px;
        text-align: center;
    }

    .navbar ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    .navbar ul li {
        display: inline;
        margin: 0 15px;
    }

    .navbar ul li a {
        text-decoration: none;
        color: #333;
        font-weight: bold;
    }

    /* Área do botão de pagamento */
    .payment-container {
        background-color: #e7f3fe;
        padding: 20px;
        text-align: center;
    }

    .payment-container button {
        background-color: #4CAF50;
        color: white;
        padding: 15px 32px;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .payment-container button:hover {
        background-color: #45a049;
    }
</style>
</head>
<body>

<div class="site-wrapper">
    <!-- Contêiner do vídeo (WebRTC) -->
    <div id="video-container">
        <div id="jaas-container"></div>
    </div>

    <!-- Seção de navegação -->
    <div class="navbar">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </div>

    <!-- Botão da página de pagamento -->
    <div class="payment-container">
        <button onclick="copiarPixPagamento()">Copiar Pix de Pagamento</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
