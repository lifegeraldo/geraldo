            DEFAULT_REMOTE_DISPLAY_NAME: "Espectador",
            TOOLBAR_BUTTONS: [
                'microphone', 'camera', 'chat', 'fullscreen', 'settings'

    };
    
    const api = new JitsiMeetExternalAPI(domain, options);
